name: Build AutoHotkey v2 EXE

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download AutoHotkey v2 and Ahk2Exe from GitHub Releases
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $tools = Join-Path $env:RUNNER_TEMP "ahk-tools"
          $ahkV2Dir = Join-Path $tools "autohotkey-v2"
          $ahk2ExeDir = Join-Path $tools "ahk2exe"

          New-Item -ItemType Directory -Force -Path $tools, $ahkV2Dir, $ahk2ExeDir | Out-Null

          $headers = @{
            "User-Agent" = "github-actions"
            "Accept"     = "application/vnd.github+json"
          }

          if ($env:GITHUB_TOKEN) {
            $headers["Authorization"] = "Bearer $env:GITHUB_TOKEN"
          }

          function Get-LatestReleaseAsset {
            param(
              [Parameter(Mandatory = $true)][string]$Repository,
              [Parameter(Mandatory = $true)][string]$AssetPattern
            )

            $release = Invoke-RestMethod `
              -Headers $headers `
              -Uri "https://api.github.com/repos/$Repository/releases/latest"

            $asset = $release.assets |
              Where-Object { $_.name -match $AssetPattern } |
              Select-Object -First 1

            if (-not $asset) {
              $assetNames = ($release.assets | ForEach-Object { $_.name }) -join ", "
              throw "Asset not found in $Repository latest release. Pattern: $AssetPattern. Available assets: $assetNames"
            }

            return [pscustomobject]@{
              Tag = $release.tag_name
              Name = $asset.name
              Url = $asset.browser_download_url
            }
          }

          # AutoHotkey v2 runtime/base file. Do not use autohotkey.com/download because it may return a Cloudflare challenge in CI.
          $ahkV2Asset = Get-LatestReleaseAsset `
            -Repository "AutoHotkey/AutoHotkey" `
            -AssetPattern "^AutoHotkey_2\..*\.zip$"

          $ahkV2Zip = Join-Path $tools $ahkV2Asset.Name
          Write-Host "Downloading AutoHotkey $($ahkV2Asset.Tag): $($ahkV2Asset.Name)"
          Invoke-WebRequest -Headers $headers -Uri $ahkV2Asset.Url -OutFile $ahkV2Zip
          Expand-Archive $ahkV2Zip $ahkV2Dir -Force

          $base = Get-ChildItem $ahkV2Dir -Recurse -Filter "AutoHotkey64.exe" |
            Select-Object -First 1

          if (-not $base) {
            Get-ChildItem $ahkV2Dir -Recurse | Select-Object FullName | Format-Table -AutoSize
            throw "AutoHotkey64.exe not found in AutoHotkey v2 ZIP."
          }

          # Current Ahk2Exe release. Prefer ZIP; fall back to EXE if a future release only provides the executable.
          $ahk2ExeRelease = Invoke-RestMethod `
            -Headers $headers `
            -Uri "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest"

          $ahk2ExeZipAsset = $ahk2ExeRelease.assets |
            Where-Object { $_.name -match "^Ahk2Exe.*\.zip$" } |
            Select-Object -First 1

          $ahk2ExeExeAsset = $ahk2ExeRelease.assets |
            Where-Object { $_.name -match "^Ahk2Exe.*\.exe$" } |
            Select-Object -First 1

          if ($ahk2ExeZipAsset) {
            $ahk2ExeZip = Join-Path $tools $ahk2ExeZipAsset.name
            Write-Host "Downloading Ahk2Exe $($ahk2ExeRelease.tag_name): $($ahk2ExeZipAsset.name)"
            Invoke-WebRequest -Headers $headers -Uri $ahk2ExeZipAsset.browser_download_url -OutFile $ahk2ExeZip
            Expand-Archive $ahk2ExeZip $ahk2ExeDir -Force

            $compiler = Get-ChildItem $ahk2ExeDir -Recurse -Filter "Ahk2Exe.exe" |
              Select-Object -First 1
          }
          elseif ($ahk2ExeExeAsset) {
            $compilerPath = Join-Path $ahk2ExeDir "Ahk2Exe.exe"
            Write-Host "Downloading Ahk2Exe $($ahk2ExeRelease.tag_name): $($ahk2ExeExeAsset.name)"
            Invoke-WebRequest -Headers $headers -Uri $ahk2ExeExeAsset.browser_download_url -OutFile $compilerPath
            $compiler = Get-Item $compilerPath
          }
          else {
            $assetNames = ($ahk2ExeRelease.assets | ForEach-Object { $_.name }) -join ", "
            throw "Ahk2Exe asset not found. Available assets: $assetNames"
          }

          if (-not $compiler) {
            Get-ChildItem $ahk2ExeDir -Recurse | Select-Object FullName | Format-Table -AutoSize
            throw "Ahk2Exe.exe not found after download/extract."
          }

          "AHK2EXE=$($compiler.FullName)" >> $env:GITHUB_ENV
          "AHK_BASE=$($base.FullName)" >> $env:GITHUB_ENV

          Write-Host "Compiler: $($compiler.FullName)"
          Write-Host "Base:     $($base.FullName)"

      - name: Compile
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $input = "src\f13-nav.ahk"
          $outputDir = "dist"
          $output = "$outputDir\f13-nav.exe"

          if (!(Test-Path $input)) {
            throw "Input script not found: $input"
          }

          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          & "$env:AHK2EXE" `
            /in "$input" `
            /out "$output" `
            /base "$env:AHK_BASE" `
            /compress 0 `
            /silent verbose

          if ($LASTEXITCODE -ne 0) {
            throw "Ahk2Exe failed with exit code $LASTEXITCODE"
          }

          if (!(Test-Path $output)) {
            throw "Output exe was not created: $output"
          }

      - name: Show SHA256
        shell: pwsh
        run: |
          Get-FileHash dist\f13-nav.exe -Algorithm SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: f13-nav
          path: dist/f13-nav.exe
