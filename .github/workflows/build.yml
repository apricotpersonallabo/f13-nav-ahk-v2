name: Build AutoHotkey v2 EXE

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AUTOHOTKEY_RELEASE_TAG: v2.0.26
  AHK2EXE_RELEASE_TAG: Ahk2Exe1.1.37.02a2

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download AutoHotkey v2 and Ahk2Exe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $tools = "$env:RUNNER_TEMP\ahk-tools"
          New-Item -ItemType Directory -Force -Path $tools | Out-Null

          $headers = @{ "User-Agent" = "github-actions" }

          # Download pinned AutoHotkey v2 release.
          $ahkRelease = Invoke-RestMethod `
            -Headers $headers `
            -Uri "https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/tags/${env:AUTOHOTKEY_RELEASE_TAG}"

          $ahkAsset = $ahkRelease.assets |
            Where-Object { $_.name -match '^AutoHotkey_2\..*\.zip$' } |
            Select-Object -First 1

          if (-not $ahkAsset) {
            throw "AutoHotkey v2 ZIP asset not found for release ${env:AUTOHOTKEY_RELEASE_TAG}."
          }

          $ahkZip = Join-Path $tools "autohotkey-v2.zip"
          Invoke-WebRequest $ahkAsset.browser_download_url -OutFile $ahkZip
          Expand-Archive $ahkZip (Join-Path $tools "autohotkey-v2") -Force

          # Download pinned Ahk2Exe release.
          $ahk2exeRelease = Invoke-RestMethod `
            -Headers $headers `
            -Uri "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/tags/${env:AHK2EXE_RELEASE_TAG}"

          $ahk2exeAsset = $ahk2exeRelease.assets |
            Where-Object { $_.name -match '^Ahk2Exe.*\.zip$' -or $_.name -match '^Ahk2Exe.*\.exe$' } |
            Select-Object -First 1

          if (-not $ahk2exeAsset) {
            throw "Ahk2Exe release asset not found for release ${env:AHK2EXE_RELEASE_TAG}."
          }

          $ahk2exeDownload = Join-Path $tools $ahk2exeAsset.name
          Invoke-WebRequest $ahk2exeAsset.browser_download_url -OutFile $ahk2exeDownload

          $ahk2exeDir = Join-Path $tools "ahk2exe"
          New-Item -ItemType Directory -Force -Path $ahk2exeDir | Out-Null

          if ($ahk2exeAsset.name -match '\.zip$') {
            Expand-Archive $ahk2exeDownload $ahk2exeDir -Force
            $compiler = Get-ChildItem $ahk2exeDir -Recurse -Filter "Ahk2Exe.exe" | Select-Object -First 1
          } else {
            $compilerPath = Join-Path $ahk2exeDir "Ahk2Exe.exe"
            Copy-Item $ahk2exeDownload $compilerPath -Force
            $compiler = Get-Item $compilerPath
          }

          $base = Get-ChildItem (Join-Path $tools "autohotkey-v2") -Recurse -Filter "AutoHotkey64.exe" |
            Select-Object -First 1

          if (-not $compiler) {
            throw "Ahk2Exe.exe not found after download."
          }

          if (-not $base) {
            throw "AutoHotkey64.exe not found in AutoHotkey v2 ZIP."
          }

          "AHK2EXE=$($compiler.FullName)" >> $env:GITHUB_ENV
          "AHK_BASE=$($base.FullName)" >> $env:GITHUB_ENV

          Write-Host "Compiler: $($compiler.FullName)"
          Write-Host "Base:     $($base.FullName)"

      - name: Compile
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $input = "src\f13-nav.ahk"
          $outputDir = "dist"
          $output = "$outputDir\f13-nav.exe"

          if (!(Test-Path $input)) {
            throw "Input script not found: $input"
          }

          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          & "$env:AHK2EXE" `
            /in "$input" `
            /out "$output" `
            /base "$env:AHK_BASE" `
            /compress 0 `
            /silent verbose

          $exitCode = if ($null -eq $LASTEXITCODE) { 0 } else { [int]$LASTEXITCODE }

          if ($exitCode -eq 0) {
            $deadline = (Get-Date).AddSeconds(15)
            while (-not (Test-Path $output) -and (Get-Date) -lt $deadline) {
              Start-Sleep -Milliseconds 500
            }
          }

          if ($exitCode -ne 0 -or -not (Test-Path $output)) {
            throw "Ahk2Exe failed with exit code $exitCode"
          }

      - name: Show SHA256
        shell: pwsh
        run: |
          Get-FileHash dist\f13-nav.exe -Algorithm SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: f13-nav
          path: dist/f13-nav.exe
