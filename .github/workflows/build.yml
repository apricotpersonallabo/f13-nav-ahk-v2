name: Build AutoHotkey v2 EXE

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download AutoHotkey v2 and Ahk2Exe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $tools = "$env:RUNNER_TEMP\ahk-tools"
          New-Item -ItemType Directory -Force -Path $tools | Out-Null

          # AutoHotkey v2 runtime/base file.
          # Fixed endpoint for the current v2 ZIP.
          $ahkV2Zip = Join-Path $tools "ahk-v2.zip"
          Invoke-WebRequest `
            -Uri "https://www.autohotkey.com/download/ahk-v2.zip" `
            -OutFile $ahkV2Zip
          Expand-Archive $ahkV2Zip (Join-Path $tools "ahk-v2") -Force

          # Ahk2Exe is included in the final AutoHotkey v1.1 ZIP.
          # Ahk2Exe can compile v2 scripts when the v2 AutoHotkey*.exe is passed as /base.
          $ahkV1Version = "1.1.37.02"
          $ahkV1Zip = Join-Path $tools "ahk-v1.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$ahkV1Version/AutoHotkey_$ahkV1Version.zip" `
            -OutFile $ahkV1Zip
          Expand-Archive $ahkV1Zip (Join-Path $tools "ahk-v1") -Force

          $compiler = Get-ChildItem (Join-Path $tools "ahk-v1") -Recurse -Filter "Ahk2Exe.exe" |
            Where-Object { $_.FullName -match "[\\/]Compiler[\\/]Ahk2Exe\.exe$" } |
            Select-Object -First 1

          $base = Get-ChildItem (Join-Path $tools "ahk-v2") -Recurse -Filter "AutoHotkey64.exe" |
            Select-Object -First 1

          if (-not $compiler) {
            Write-Host "AutoHotkey v1 extracted files:"
            Get-ChildItem (Join-Path $tools "ahk-v1") -Recurse | Select-Object FullName
            throw "Ahk2Exe.exe not found in AutoHotkey v1 ZIP."
          }

          if (-not $base) {
            Write-Host "AutoHotkey v2 extracted files:"
            Get-ChildItem (Join-Path $tools "ahk-v2") -Recurse | Select-Object FullName
            throw "AutoHotkey64.exe not found in AutoHotkey v2 ZIP."
          }

          "AHK2EXE=$($compiler.FullName)" >> $env:GITHUB_ENV
          "AHK_BASE=$($base.FullName)" >> $env:GITHUB_ENV

          Write-Host "Ahk2Exe: $($compiler.FullName)"
          Write-Host "Base:    $($base.FullName)"

      - name: Compile
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $input = "src\f13-nav.ahk"
          $outputDir = "dist"
          $output = "$outputDir\f13-nav.exe"

          if (!(Test-Path $input)) {
            throw "Input script not found: $input"
          }

          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          & "$env:AHK2EXE" `
            /in "$input" `
            /out "$output" `
            /base "$env:AHK_BASE" `
            /compress 0 `
            /silent verbose

          if ($LASTEXITCODE -ne 0) {
            throw "Ahk2Exe failed with exit code $LASTEXITCODE"
          }

          if (!(Test-Path $output)) {
            throw "Output exe was not created: $output"
          }

      - name: Show SHA256
        shell: pwsh
        run: |
          Get-FileHash dist\f13-nav.exe -Algorithm SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: f13-nav
          path: dist/f13-nav.exe
